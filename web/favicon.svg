<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#17A2A2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Gradient background -->
  <rect width="192" height="192" fill="url(#logoGradient)" rx="32"/>
  
  <!-- U-shaped icon with houses -->
  <!-- Left house (orange) -->
  <g transform="translate(30, 50)">
    <polygon points="20,0 40,20 0,20" fill="white" opacity="0.9"/>
    <rect x="5" y="20" width="30" height="25" fill="white" opacity="0.9"/>
    <rect x="12" y="27" width="6" height="6" fill="#FF9500"/>
    <rect x="22" y="27" width="6" height="6" fill="#FF9500"/>
  </g>
  
  <!-- Right house (teal) -->
  <g transform="translate(110, 50)">
    <polygon points="20,0 40,20 0,20" fill="white" opacity="0.9"/>
    <rect x="5" y="20" width="30" height="25" fill="white" opacity="0.9"/>
    <rect x="12" y="27" width="16" height="16" fill="#FF9500"/>
  </g>
  
  <!-- Connection base -->
  <rect x="35" y="80" width="120" height="25" fill="white" opacity="0.9" rx="4"/>
</svg>
